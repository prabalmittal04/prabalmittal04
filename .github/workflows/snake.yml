# Generates contribution snake from rolling 12-month profile graph data.

name: Generate Contribution Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install snake generator
        run: npm install

      - name: Generate profile-matched contribution snake
        run: node scripts/generate-snake.mjs
        env:
          GITHUB_USER: prabalmittal04
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CONTRIB_PAT: ${{ secrets.CONTRIB_PAT }}

      - name: Deploy snake to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
